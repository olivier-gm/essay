<script>
// Función para abrir el modal
function openModal(modalId) {
    document.getElementById(modalId).style.display = 'block';
}

// Función para cerrar el modal
function closeModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
}

// Función para pegar texto desde el portapapeles
function pasteText(textareaId) {
    navigator.clipboard.readText()
        .then(text => {
            document.getElementById(textareaId).value = text;
        })
        .catch(err => {
            console.error('Error al pegar texto: ', err);
        });
}

// Función para guardar el texto del modal en el input correspondiente
function saveText(inputId, textareaId) {
    let input = document.getElementById(inputId);
    let textarea = document.getElementById(textareaId);
    input.value = textarea.value;
    closeModal(textareaId + '-modal');  // Cerrar el modal al guardar
}
</script>

  <script>
    function toggleFont() {
      const body = document.querySelector('.entrada_body');
      const eduInfo = document.querySelector('.edu_info');
      const button = document.getElementById('fontToggleBtn');

      if (body.style.fontFamily === '"Times New Roman", serif') {
        // Cambiar de vuelta a Arial
        body.style.fontFamily = 'Arial, sans-serif';
        eduInfo.style.fontSize = '11px';
        button.style.fontFamily = 'Arial';
        button.textContent = 'Arial';
      } else {
        // Cambiar a Times New Roman
        body.style.fontFamily = '"Times New Roman", serif';
        eduInfo.style.fontSize = '10.5px';
        button.style.fontFamily = '"Times New Roman", serif';
        button.textContent = 'Times New Roman';
      }
    }
  </script>
